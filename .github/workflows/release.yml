# Build Windows (NSIS .exe) and Linux (AppImage), attach to a GitHub Release.
# Create a release by pushing an annotated tag, e.g.:
#   git tag -a v0.1.0 -m "0.1.0 Alpha"
#   git push origin v0.1.0

name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
      # Match capital V so mistyped tags still run the release workflow.
      - "V*.*.*"
      - "V*.*.*-*"

permissions:
  contents: write

env:
  # Skip code signing on CI (no Apple / Windows certs in this workflow).
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app & NSIS installer
        run: npm run dist:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: |
            release/*.exe
            release/latest.yml
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Build app & AppImage
        run: npm run dist:linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: |
            release/*.AppImage
            release/latest-linux.yml
          if-no-files-found: error

  publish:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release (pre-release for 0.x)
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') || startsWith(github.ref_name, 'v0.') || startsWith(github.ref_name, 'V0.') }}
          generate_release_notes: true
          files: |
            release-assets/*.exe
            release-assets/*.AppImage
            release-assets/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
